<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>

  <style>
    body {
      background: linear-gradient(to right, #eef2f3#ffffff);
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
      text-align: center;
    }

    #cards {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }

    #cards div {
      text-align: center;
      font-weight: bold;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      flex: 1;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    input {
      margin-top: 20px;
      padding: 8px;
      width: 200px;
    }

    #insights {
      margin-top: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    canvas {
  margin-top: 30px;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

canvas {
  margin-top: 20px;
}

.chart-box{
  width: 300px;
  margin: 20px auto;
}

 </style>
</head>

<body>

<h1>Finance Dashboard</h1>


<select id="role">
  <option value="viewer">Viewer</option>
  <option value="admin">Admin</option>
</select>

<div id="cards">
  <div id="balance"></div>
  <div id="income"></div>
  <div id="expense"></div>
</div>


<button id="addBtn" style="display:none;">Add Transaction</button>


<br>
<input type="text" id="search" placeholder="Search by category">


<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Amount</th>
      <th>Category</th>
      <th>Type</th>
    </tr>
  </thead>
  <h2>Analytics</h2>
  <canvas id="myChart" height="60"></canvas>

  <div class="chart-box">
  <canvas id="pieChart" depth="60"></canvas>
  </div>

  <tbody id="tableBody"></tbody>
</table>


<div id="insights"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
